name: Main CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  SKIP_ENV_VALIDATION: "true"
  NEXT_PUBLIC_WEBSITE_URL: "http://localhost:3000"

jobs:
  build:
    name: Bun CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Typegen
        run: bun run typegen

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun run test:unit

      - name: Build
        run: bun run build
